<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- wings -->
  <ellipse cx="196" cy="150" rx="70" ry="46" fill="#e0f2fe" opacity="0.9" transform="rotate(-30 196 150)"/>
  <ellipse cx="316" cy="150" rx="70" ry="46" fill="#e0f2fe" opacity="0.9" transform="rotate(30 316 150)"/>
  <!-- body -->
  <ellipse cx="256" cy="264" rx="118" ry="96" fill="#fde047"/>
  <path d="M212 172 a118 96 0 0 0 0 184 z" fill="#fde047"/>
  <rect x="226" y="168" width="26" height="192" rx="13" fill="#422006"/>
  <rect x="286" y="176" width="26" height="176" rx="13" fill="#422006"/>
  <!-- face -->
  <circle cx="200" cy="248" r="14" fill="#422006"/>
  <path d="M180 292 q26 22 52 0" stroke="#422006" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- stinger -->
  <path d="M374 264 l40 0 -28 24 z" fill="#422006"/>
  <!-- antennae -->
  <path d="M216 176 q-16 -32 -44 -38" stroke="#422006" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="168" cy="136" r="10" fill="#422006"/>
  <!-- letters -->
  <text x="120" y="452" font-family="Comic Sans MS, Chalkboard SE, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">a</text>
  <text x="256" y="452" font-family="Comic Sans MS, Chalkboard SE, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">b</text>
  <text x="392" y="452" font-family="Comic Sans MS, Chalkboard SE, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">c</text>
</svg>
